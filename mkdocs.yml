site_name: MedVLM
site_url: https://jiyoungbyun.github.io/medvlm
repo_url: https://github.com/jiyoungbyun/medvlm

theme:
  name: material
  palette:
    primary: teal
  features:
    - content.code.copy
    - navigation.sections

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - API Reference:
    - Confidence Estimation: api/confidence.md
    - Calibration: api/calibration.md
    - Data & Models: api/data-models.md
  - Examples:
    - Overconfidence: examples/overconfidence.md
    - Post-hoc Calibration: examples/calibration.md
    - HAC: examples/hac.md

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - admonition
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
